<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripSync - Plan Group Trips Together</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Welcome/Onboarding Screen
        function WelcomeScreen({ onComplete }) {
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (name && email) {
                    onComplete({ name, email });
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-xl p-8 sm:p-12 max-w-md w-full">
                        <div className="flex justify-center mb-6">
                            <div className="bg-indigo-600 rounded-full p-6">
                                <i className="fas fa-plane text-white text-4xl"></i>
                            </div>
                        </div>
                        
                        <h1 className="text-3xl font-bold text-center mb-2">Welcome to TripSync</h1>
                        <p className="text-gray-500 text-center mb-8">Plan group trips together, effortlessly</p>
                        
                        <form onSubmit={handleSubmit}>
                            <div className="mb-6">
                                <label className="block text-lg font-semibold mb-2">Your Name</label>
                                <input
                                    type="text"
                                    placeholder="Enter your name"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    className="w-full px-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-600 focus:outline-none"
                                />
                            </div>
                            
                            <div className="mb-8">
                                <label className="block text-lg font-semibold mb-2">Email</label>
                                <input
                                    type="email"
                                    placeholder="your@email.com"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full px-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-600 focus:outline-none"
                                />
                            </div>
                            
                            <button
                                type="submit"
                                className="w-full bg-gray-900 text-white py-4 rounded-2xl font-semibold text-lg hover:bg-gray-800 transition-colors"
                            >
                                Get Started
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // Trips Dashboard
        function TripsDashboard({ user, onCreateTrip, onSelectTrip, trips }) {
            return (
                <div className="min-h-screen bg-gray-50">
                    <div className="max-w-6xl mx-auto p-6">
                        <div className="flex justify-between items-start mb-8">
                            <div>
                                <h1 className="text-4xl font-bold mb-2">Your Trips</h1>
                                <p className="text-gray-500 text-lg">Manage and plan your group adventures</p>
                            </div>
                            <button
                                onClick={onCreateTrip}
                                className="bg-gray-900 text-white px-6 py-3 rounded-2xl font-semibold flex items-center gap-2 hover:bg-gray-800 transition-colors"
                            >
                                <i className="fas fa-plus"></i>
                                Create Trip
                            </button>
                        </div>

                        {trips.length === 0 ? (
                            <div className="bg-white rounded-2xl shadow-sm p-16 text-center">
                                <i className="far fa-calendar text-gray-300 text-6xl mb-6"></i>
                                <h2 className="text-2xl font-semibold mb-2">No trips yet</h2>
                                <p className="text-gray-500 mb-6">Start planning your first group trip</p>
                                <button
                                    onClick={onCreateTrip}
                                    className="bg-gray-900 text-white px-6 py-3 rounded-2xl font-semibold inline-flex items-center gap-2 hover:bg-gray-800 transition-colors"
                                >
                                    <i className="fas fa-plus"></i>
                                    Create Your First Trip
                                </button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {trips.map((trip) => (
                                    <div
                                        key={trip.id}
                                        onClick={() => onSelectTrip(trip)}
                                        className="bg-white rounded-2xl shadow-sm p-6 cursor-pointer hover:shadow-lg transition-shadow border border-gray-100"
                                    >
                                        <h3 className="text-xl font-bold mb-2">{trip.name}</h3>
                                        <p className="text-gray-500 mb-4">{trip.destination}</p>
                                        <div className="flex items-center gap-2 text-sm text-gray-600">
                                            <i className="fas fa-users"></i>
                                            <span>{trip.members.length} members</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Create Trip Modal
        function CreateTripModal({ onClose, onCreate }) {
            const [tripName, setTripName] = useState('');
            const [destination, setDestination] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (tripName && destination) {
                    onCreate({ tripName, destination });
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-2xl w-full">
                        <h2 className="text-3xl font-bold mb-2">Create a New Trip</h2>
                        <p className="text-gray-500 mb-8">Start planning your group adventure</p>
                        
                        <form onSubmit={handleSubmit}>
                            <div className="mb-6">
                                <label className="block text-lg font-semibold mb-2">Trip Name</label>
                                <input
                                    type="text"
                                    placeholder="e.g., Summer Beach Getaway"
                                    value={tripName}
                                    onChange={(e) => setTripName(e.target.value)}
                                    className="w-full px-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-600 focus:outline-none"
                                />
                            </div>
                            
                            <div className="mb-8">
                                <label className="block text-lg font-semibold mb-2">Destination</label>
                                <input
                                    type="text"
                                    placeholder="e.g., Bali, Indonesia"
                                    value={destination}
                                    onChange={(e) => setDestination(e.target.value)}
                                    className="w-full px-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-600 focus:outline-none"
                                />
                            </div>
                            
                            <div className="flex gap-4">
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className="flex-1 bg-white border-2 border-gray-200 text-gray-900 py-4 rounded-2xl font-semibold text-lg hover:bg-gray-50 transition-colors"
                                >
                                    Cancel
                                </button>
                                <button
                                    type="submit"
                                    className="flex-1 bg-gray-900 text-white py-4 rounded-2xl font-semibold text-lg hover:bg-gray-800 transition-colors"
                                >
                                    Create Trip
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // Trip Detail View
        function TripDetailView({ trip, user, onBack, onInviteMember }) {
            const [showInviteModal, setShowInviteModal] = useState(false);

            const menuItems = [
                { icon: 'far fa-calendar', label: 'Set Availability', action: () => alert('Set Availability feature coming soon!') },
                { icon: 'fas fa-tasks', label: 'Vote on Activities', action: () => alert('Vote on Activities feature coming soon!') },
                { icon: 'far fa-calendar-check', label: 'View Schedule', action: () => alert('View Schedule feature coming soon!') },
            ];

            return (
                <div className="min-h-screen bg-gray-50">
                    <div className="max-w-4xl mx-auto p-6">
                        <button
                            onClick={onBack}
                            className="mb-6 text-gray-600 hover:text-gray-900 flex items-center gap-2"
                        >
                            <i className="fas fa-arrow-left"></i>
                            Back to Trips
                        </button>

                        <div className="bg-white rounded-2xl shadow-sm p-8 mb-6">
                            <h1 className="text-3xl font-bold mb-2">{trip.name}</h1>
                            <p className="text-gray-500 text-lg mb-6">{trip.destination}</p>
                            
                            <div className="flex items-center gap-4">
                                <div className="flex -space-x-2">
                                    {trip.members.map((member, idx) => (
                                        <div
                                            key={idx}
                                            className="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center font-semibold border-2 border-white"
                                        >
                                            {member.name.charAt(0).toUpperCase()}
                                        </div>
                                    ))}
                                </div>
                                <button
                                    onClick={() => setShowInviteModal(true)}
                                    className="text-indigo-600 hover:text-indigo-700 font-semibold flex items-center gap-2"
                                >
                                    <i className="fas fa-user-plus"></i>
                                    Invite Members
                                </button>
                            </div>
                        </div>

                        <div className="space-y-4">
                            {menuItems.map((item, idx) => (
                                <button
                                    key={idx}
                                    onClick={item.action}
                                    className="w-full bg-white rounded-2xl shadow-sm p-6 hover:shadow-md transition-shadow text-left flex items-center gap-4 border border-gray-100"
                                >
                                    <i className={`${item.icon} text-2xl text-gray-700`}></i>
                                    <span className="text-lg font-semibold">{item.label}</span>
                                </button>
                            ))}
                        </div>

                        <button
                            onClick={onBack}
                            className="mt-8 text-gray-500 hover:text-gray-700 flex items-center gap-2"
                        >
                            <i className="fas fa-cog"></i>
                            Settings
                        </button>
                    </div>

                    {showInviteModal && (
                        <InviteMemberModal
                            onClose={() => setShowInviteModal(false)}
                            onInvite={onInviteMember}
                        />
                    )}
                </div>
            );
        }

        // Invite Member Modal
        function InviteMemberModal({ onClose, onInvite }) {
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                if (name && email) {
                    onInvite({ name, email });
                    alert('Invite sent successfully!');
                    onClose();
                }
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-3xl shadow-2xl p-8 max-w-2xl w-full">
                        <h2 className="text-3xl font-bold mb-2">Invite Members</h2>
                        <p className="text-gray-500 mb-8">Add people to your trip</p>
                        
                        <form onSubmit={handleSubmit}>
                            <div className="mb-6">
                                <label className="block text-lg font-semibold mb-2">Invite Method</label>
                                <div className="w-full px-4 py-3 bg-gray-50 rounded-xl flex items-center gap-3 text-gray-700">
                                    <i className="far fa-envelope"></i>
                                    <span>Email</span>
                                </div>
                            </div>

                            <div className="mb-6">
                                <label className="block text-lg font-semibold mb-2">Name</label>
                                <input
                                    type="text"
                                    placeholder="Friend's name"
                                    value={name}
                                    onChange={(e) => setName(e.target.value)}
                                    className="w-full px-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-600 focus:outline-none"
                                />
                            </div>
                            
                            <div className="mb-8">
                                <label className="block text-lg font-semibold mb-2">Email</label>
                                <input
                                    type="email"
                                    placeholder="friend@email.com"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full px-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-indigo-600 focus:outline-none"
                                />
                            </div>
                            
                            <button
                                type="submit"
                                className="w-full bg-gray-900 text-white py-4 rounded-2xl font-semibold text-lg hover:bg-gray-800 transition-colors flex items-center justify-center gap-2"
                            >
                                <i className="fas fa-user-plus"></i>
                                Send Invite
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [trips, setTrips] = useState([]);
            const [selectedTrip, setSelectedTrip] = useState(null);
            const [showCreateModal, setShowCreateModal] = useState(false);

            const handleWelcomeComplete = (userData) => {
                setUser(userData);
            };

            const handleCreateTrip = (tripData) => {
                const newTrip = {
                    id: Date.now(),
                    name: tripData.tripName,
                    destination: tripData.destination,
                    members: [user],
                };
                setTrips([...trips, newTrip]);
                setShowCreateModal(false);
            };

            const handleInviteMember = (memberData) => {
                if (selectedTrip) {
                    const updatedTrips = trips.map(trip => 
                        trip.id === selectedTrip.id
                            ? { ...trip, members: [...trip.members, memberData] }
                            : trip
                    );
                    setTrips(updatedTrips);
                    setSelectedTrip(updatedTrips.find(t => t.id === selectedTrip.id));
                }
            };

            if (!user) {
                return <WelcomeScreen onComplete={handleWelcomeComplete} />;
            }

            if (selectedTrip) {
                return (
                    <TripDetailView
                        trip={selectedTrip}
                        user={user}
                        onBack={() => setSelectedTrip(null)}
                        onInviteMember={handleInviteMember}
                    />
                );
            }

            return (
                <>
                    <TripsDashboard
                        user={user}
                        trips={trips}
                        onCreateTrip={() => setShowCreateModal(true)}
                        onSelectTrip={setSelectedTrip}
                    />
                    {showCreateModal && (
                        <CreateTripModal
                            onClose={() => setShowCreateModal(false)}
                            onCreate={handleCreateTrip}
                        />
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
